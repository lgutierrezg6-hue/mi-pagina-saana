<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - SAANA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ESTILOS BÁSICOS DEL CATÁLOGO */
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background-color: #000000; padding: 25px; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .logo { font-weight: bold; font-size: 22px; letter-spacing: 2px; display: flex; align-items: center; margin-bottom: 40px; color: white;}
        .logo-icon { color: #d4af37; margin-right: 10px; font-size: 26px;}
        .menu { list-style: none; padding: 0; flex: 1;} .menu-link { color: #888; text-decoration: none; display: block; padding: 10px; margin-bottom: 5px; border-radius: 10px; transition: 0.3s;} .menu-link.active, .menu-link:hover { background: white; color: black;} .menu-link i { margin-right: 10px;}
        .logout-link { margin-top: auto; color: #d4af37; cursor: pointer; text-decoration: none; display: flex; align-items: center;}
        
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('fondo_tienda.jpg'); background-size: cover; background-position: center; }
        .catalog-header { display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center;}
        .search-bar { background: rgba(255,255,255,0.1); border: none; padding: 10px 20px; border-radius: 20px; color: white; width: 300px;}
        
        /* GRID DE PRODUCTOS */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .product-card {
            background-color: white; border-radius: 20px; overflow: hidden; color: #333;
            transition: transform 0.3s; cursor: pointer; position: relative;
        }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .product-image-container { height: 200px; overflow: hidden; background: #f4f4f4;}
        .product-image { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 15px; }
        .product-price { color: #d450e6; font-size: 18px; font-weight: bold; display: block; }
        .product-title { font-size: 16px; font-weight: bold; margin: 5px 0 15px; color: black; }
        .add-to-cart-btn { position: absolute; bottom: 15px; right: 15px; background: #f0f0f0; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 16px; transition: 0.3s;}
        .add-to-cart-btn:hover { background: #d450e6; color: white; }

        /* --- ESTILOS DEL MODAL (POP-UP) --- */
        .modal-overlay {
            display: none; /* Oculto por defecto */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); z-index: 1000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; } /* Se muestra cuando tiene esta clase */
        .modal-content {
            background-color: white; color: #333; width: 100%; max-width: 800px;
            border-radius: 25px; overflow: hidden; display: flex; position: relative;
        }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; z-index: 10; color: #666;}
        .modal-img-container { flex: 1; background: #f4f4f4; display: flex; align-items: center; justify-content: center;}
        .modal-img { max-width: 100%; max-height: 400px; object-fit: contain;}
        .modal-details { flex: 1; padding: 40px; display: flex; flex-direction: column;}
        .modal-title { font-size: 28px; margin: 0 0 20px;}
        .modal-desc { font-size: 16px; color: #666; line-height: 1.6; flex-grow: 1;}
        .modal-price { font-size: 32px; color: #d450e6; font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><span class="logo-icon">♦</span> SAANA</div>
        <ul class="menu">
            <li><a href="#" class="menu-link active"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="#" class="menu-link"><i class="fas fa-shopping-cart"></i> Carrito</a></li>
        </ul>
        <a href="login.html" class="logout-link" id="btn-logout"><i class="fas fa-sign-out-alt menu-icon"></i> Log Out</a>
    </div>

    <div class="main-content">
        <div class="catalog-header">
            <h1>Catálogo</h1>
            <input type="text" class="search-bar" placeholder="Buscar...">
        </div>

        <!-- GRID DE PRODUCTOS -->
        <!-- NOTA: He puesto enlaces a imágenes de internet para que se vean YA MISMO. -->
        <!-- Los atributos 'data-' tienen la info para el pop-up -->
        <div class="product-grid">
            <!-- Producto 1 -->
            <div class="product-card" 
                 data-nombre="Reloj Inteligente Aura" 
                 data-precio="$180.000" 
                 data-descripcion="El compañero perfecto para tu salud y deporte. Monitoreo 24/7, GPS integrado y resistencia al agua."
                 data-imagen="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500&auto=format&fit=crop">
                <div class="product-image-container">
                    <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500&auto=format&fit=crop" alt="Reloj" class="product-image">
                </div>
                <div class="product-info">
                    <span class="product-price">$180.000</span>
                    <h3 class="product-title">Reloj Aura</h3>
                </div>
                <button class="add-to-cart-btn"><i class="fas fa-shopping-cart"></i></button>
            </div>

            <!-- Producto 2 -->
            <div class="product-card" 
                 data-nombre="Audífonos Pro Sound" 
                 data-precio="$75.000" 
                 data-descripcion="Sumérgete en la música con cancelación de ruido activa y hasta 30 horas de batería."
                 data-imagen="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&auto=format&fit=crop">
                <div class="product-image-container">
                    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&auto=format&fit=crop" alt="Audífonos" class="product-image">
                </div>
                <div class="product-info">
                    <span class="product-price">$75.000</span>
                    <h3 class="product-title">Audífonos Pro</h3>
                </div>
                <button class="add-to-cart-btn"><i class="fas fa-shopping-cart"></i></button>
            </div>
            
            <!-- Producto 3 -->
             <div class="product-card" 
                 data-nombre="Cámara Instantánea Retro" 
                 data-precio="$120.000" 
                 data-descripcion="Captura momentos y imprímelos al instante con un estilo vintage único."
                 data-imagen="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=500&auto=format&fit=crop">
                <div class="product-image-container">
                    <img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=500&auto=format&fit=crop" alt="Cámara" class="product-image">
                </div>
                <div class="product-info">
                    <span class="product-price">$120.000</span>
                    <h3 class="product-title">Cámara Retro</h3>
                </div>
                <button class="add-to-cart-btn"><i class="fas fa-shopping-cart"></i></button>
            </div>
        </div>
    </div>

    <!-- ESTRUCTURA DEL MODAL (POP-UP) - OCULTA INICIALMENTE -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-content">
            <span class="modal-close" id="close-modal">&times;</span>
            <div class="modal-img-container">
                <img src="" id="modal-img" class="modal-img">
            </div>
            <div class="modal-details">
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-desc" id="modal-desc"></p>
                <span class="modal-price" id="modal-price"></span>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
