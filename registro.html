<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario - SAANA</title>
    <style>
        /* --- ESTILOS BASE --- */
        /* Se aplica el fondo de la tienda con una capa oscura encima, 
           exactamente como en la imagen del login que enviaste. */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            /* ASEGÚRATE QUE TU IMAGEN SE LLAME 'fondo_tienda.jpg' */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('fondo-tienda.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh; /* Altura completa de la pantalla */
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER SIMPLE (Logo arriba a la izquierda) --- */
        .header {
            padding: 30px 40px;
        }
        .logo {
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }
        .logo-icon {
            color: #d4af37;
            margin-right: 10px;
            font-size: 28px;
        }

        /* --- CONTENEDOR PRINCIPAL CENTRADO --- */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 40px;
        }

        /* --- CONTENEDOR DEL FORMULARIO "FLOTANTE" --- */
        /* NO tiene color de fondo, los elementos flotan sobre la imagen */
        .registro-form-container {
            width: 100%;
            max-width: 900px;
            /* Sin background-color ni bordes */
        }

        /* Título principal */
        h1 {
            text-align: center;
            font-size: 32px;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-weight: bold;
            text-transform: uppercase;
            color: white; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* Grid de dos columnas para organizar los campos */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px 50px; /* Espacio vertical y horizontal entre campos */
        }

        .form-group {
            margin-bottom: 20px;
        }

        /* Etiquetas (Labels) blancas, en mayúsculas y bold */
         label {
            display: block;
            margin-bottom: 8px; /* Espacio debajo del texto */
            font-weight: 900; /* 900 es el grosor máximo (Extra Bold) */
            font-size: 14px;  /* Un poco más grande para que se note más */
            letter-spacing: 1px; /* Espacio entre letras */
            text-transform: uppercase; /* Todo en mayúsculas */
            color: white; /* COLOR BLANCO PURO */
            /* Sombra suave para que resalte sobre el fondo */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* --- INPUTS BLANCOS REDONDEADOS (Estilo Login) --- */
        .saana-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px; /* Muy redondeados */
            border: none;
            background-color: white; /* Fondo blanco sólido */
            color: #333;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            height: 50px;
        }

        /* Estilos para los select de fecha para que coincidan */
        .date-group {
            display: flex;
            gap: 10px;
        }
        .date-input {
            flex: 1;
            text-align: center;
            padding: 15px 10px;
            /* Flecha personalizada negra */
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat;
            background-position-x: 90%;
            background-position-y: center;
        }

        /* --- BOTÓN DE REGISTRO CENTRADO --- */
        .btn-submit-container {
            grid-column: 1 / -1; /* Ocupa todo el ancho abajo */
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }
        .btn-submit {
            background-color: white;
            color: black;
            border: none;
            padding: 15px 60px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s;
        }
        .btn-submit:hover {
            transform: scale(1.05); /* Efecto al pasar el mouse */
        }

        /* Enlace inferior */
        .login-link-container {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .login-link {
            color: white;
            text-decoration: underline;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsive para celulares */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; gap: 20px; } /* Una sola columna */
            .header { padding: 20px; }
            .main-container { padding: 20px; }
            h1 { font-size: 24px; }
        }
        /* =========================================
           RESPONSIVE: REGLAS PARA MÓVILES
           (Pega esto al final de tu <style> en login.html y registro.html)
        ========================================= */
        
        /* Cuando la pantalla tenga 768px de ancho o menos (Tablets y Celulares) */
        @media (max-width: 768px) {
            /* Reducimos el padding del header */
            .header {
                padding: 15px 20px;
            }

            /* El contenedor principal tiene menos padding */
            .main-container {
                padding: 20px;
                /* En registro, alineamos arriba en vez de al centro verticalmente para que no corte si es muy largo */
                align-items: flex-start; 
            }

            /* La caja del formulario (login o registro) ocupa el ancho completo */
            /* Nota: usamos nombres de clases genéricos para que sirva en ambos archivos si los usaste */
            .form-box, .login-box, .registro-form-container {
                padding: 30px 20px; /* Menos relleno interno */
                max-width: 100%;    /* Ocupa todo el ancho disponible */
                border-radius: 15px; /* Bordes menos redondeados para ganar espacio */
            }

            /* Títulos más pequeños */
            h1, h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            /* --- ESPECÍFICO PARA REGISTRO --- */
            /* Cambiamos la cuadrícula de 2 columnas a 1 sola columna */
            .form-grid {
                grid-template-columns: 1fr; /* Una sola columna */
                gap: 20px; /* Menos espacio entre campos */
            }

            /* Los inputs de fecha se apilan verticalmente si hace falta, o se mantienen pequeños */
            .date-group {
                gap: 5px;
            }
            .date-input {
                padding: 15px 5px; /* Menos padding lateral */
            }

            /* Botón de registro ocupa todo el ancho */
            .btn-submit {
                width: 100%;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER CON LOGO -->
    <div class="header">
        <div class="logo"><span class="logo-icon">♦</span> SAANA</div>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="main-container">
        <!-- Formulario flotante sin fondo propio -->
        <div class="registro-form-container">
            <h1>CREAR CUENTA</h1>
            
            <!-- Formulario conectado a auth.js -->
            <form id="form-registro-saana">
                <div class="form-grid">
                    <!-- COLUMNA IZQUIERDA -->
                    <div class="left-column">
                        <div class="form-group">
                            <label>NOMBRE:</label>
                            <input type="text" id="reg-nombre" class="saana-input" required>
                        </div>
                        <div class="form-group">
                            <label>APELLIDO:</label>
                            <input type="text" id="reg-apellido" class="saana-input" required>
                        </div>
                        <div class="form-group">
                            <label>FECHA DE NACIMIENTO:</label>
                            <div class="date-group">
                                <select id="reg-dia" class="saana-input date-input" required>
                                    <option value="">DIA</option>
                                    <script>for(let i=1;i<=31;i++) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                                <select id="reg-mes" class="saana-input date-input" required>
                                    <option value="">MES</option>
                                    <option value="Enero">Enero</option><option value="Febrero">Febrero</option><option value="Marzo">Marzo</option><option value="Abril">Abril</option><option value="Mayo">Mayo</option><option value="Junio">Junio</option><option value="Julio">Julio</option><option value="Agosto">Agosto</option><option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option><option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
                                </select>
                                <select id="reg-anio" class="saana-input date-input" required>
                                    <option value="">AÑO</option>
                                    <script>for(let i=2023;i>=1950;i--) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- COLUMNA DERECHA -->
                    <div class="right-column">
                        <div class="form-group">
                            <label>CORREO ELECTRÓNICO:</label>
                            <input type="email" id="reg-email" class="saana-input" required>
                        </div>
                        <div class="form-group">
                            <label>TELÉFONO:</label>
                            <input type="tel" id="reg-telefono" class="saana-input" required>
                        </div>
                        <div class="form-group">
                             <label>CONTRASEÑA:</label>
                            <input type="password" id="reg-password" class="saana-input" required>
                        </div>
                         <div class="form-group">
                            <label>CONFIRMAR CONTRASEÑA:</label>
                            <input type="password" id="reg-confirm-password" class="saana-input" required>
                        </div>
                    </div>

                    <!-- Botón de registro centrado al final -->
                    <div class="btn-submit-container">
                        <button type="submit" class="btn-submit">REGISTRARSE</button>
                    </div>
                </div>
            </form>
            
            <!-- Enlace para volver al login -->
            <div class="login-link-container">
                <a href="login.html" class="login-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <!-- Conexión con JavaScript -->
    <script src="auth.js"></script>
</body>
</html>
