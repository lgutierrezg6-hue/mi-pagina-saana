<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario - SAANA</title>
    <style>
        /* --- ESTILOS BASE (Igual que antes) --- */
        body {
            margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            /* REEMPLAZA 'fondo_tienda.jpg' por tu imagen real */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('fondo_tienda.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; min-height: 100vh; display: flex; flex-direction: column;
        }

        /* --- HEADER Y LOGO --- */
        .header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 24px; letter-spacing: 2px; display: flex; align-items: center; }
        .logo-icon { color: #d4af37; margin-right: 10px; font-size: 28px; }
        
        /* --- NUEVO ESTILO PARA EL BOTÓN "Sign in" --- */
        .signin-btn {
            color: white; /* Texto blanco */
            text-decoration: none;
            font-weight: bold;
            border: 2px solid white; /* Borde blanco */
            padding: 10px 20px;
            border-radius: 30px; /* Redondeado */
            transition: all 0.3s ease;
            font-size: 14px;
            text-transform: uppercase;
        }
        .signin-btn:hover {
            background-color: white;
            color: black; /* Al pasar el mouse se invierten colores */
        }

        /* --- CONTENEDOR PRINCIPAL (Efecto Vidrio) --- */
        .main-container {
            flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px;
        }
        .glass-container {
            background: rgba(255, 255, 255, 0.1); /* Más transparente */
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; padding: 50px; width: 100%; max-width: 900px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* --- FORMULARIO EN DOS COLUMNAS --- */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        h2 { font-size: 28px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 14px; letter-spacing: 1px; }
        
        /* Estilos de Inputs */
        .saana-input {
            width: 100%; padding: 15px 20px; border-radius: 50px; border: none;
            outline: none; font-size: 16px; background-color: rgba(255, 255, 255, 0.9); color: #333;
            box-sizing: border-box; transition: all 0.3s;
        }
        .saana-input:focus { background-color: white; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        
        /* Estilos para fecha */
        .date-group { display: flex; gap: 10px; }
        .date-input { flex: 1; text-align: center; padding: 15px 10px; }
        
        /* Botón de registro */
        .btn-submit-container {
            grid-column: 1 / -1; /* Ocupa todo el ancho abajo */
            display: flex; justify-content: flex-end; margin-top: 20px;
        }
        .btn-submit {
            background-color: white; color: black; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 18px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; transition: transform 0.2s, background-color 0.3s;
        }
        .btn-submit:hover { background-color: #f0f0f0; transform: scale(1.02); }
        .btn-arrow { margin-left: 10px; font-size: 24px; }

        /* Ajuste para móviles */
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; gap: 20px; } .header { padding: 20px; }}
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span class="logo-icon">♦</span> SAANA</div>
        <!-- Botón "Sign in" arreglado -->
        <a href="login.html" class="signin-btn">Sign in</a>
    </div>

    <div class="main-container">
        <div class="glass-container">
            <!-- Formulario conectado a auth.js -->
            <form id="form-registro-saana">
                <div class="form-grid">
                    <!-- COLUMNA IZQUIERDA -->
                    <div class="left-column">
                        <h2>REGISTRAR USUARIO</h2>
                        <div class="form-group">
                            <label>NOMBRE:</label>
                            <!-- AÑADIDO 'required' -->
                            <input type="text" id="reg-nombre" class="saana-input" placeholder="Tu nombre" required>
                        </div>
                        <div class="form-group">
                            <label>APELLIDO:</label>
                            <!-- AÑADIDO 'required' -->
                            <input type="text" id="reg-apellido" class="saana-input" placeholder="Tu apellido" required>
                        </div>
                        <div class="form-group">
                            <label>FECHA DE NACIMIENTO:</label>
                            <div class="date-group">
                                <!-- AÑADIDO 'required' a los select -->
                                <select id="reg-dia" class="saana-input date-input" required>
                                    <option value="">DIA</option>
                                    <!-- Generamos días con JS simple para no llenar el HTML -->
                                    <script>for(let i=1;i<=31;i++) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                                <select id="reg-mes" class="saana-input date-input" required>
                                    <option value="">MES</option>
                                    <option value="Enero">Enero</option><option value="Febrero">Febrero</option><option value="Marzo">Marzo</option><option value="Abril">Abril</option><option value="Mayo">Mayo</option><option value="Junio">Junio</option><option value="Julio">Julio</option><option value="Agosto">Agosto</option><option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option><option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
                                </select>
                                <select id="reg-anio" class="saana-input date-input" required>
                                    <option value="">AÑO</option>
                                    <script>for(let i=2023;i>=1950;i--) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CORREO:</label>
                            <input type="email" id="reg-email" class="saana-input" placeholder="ejemplo@gmail.com" required>
                        </div>
                        <div class="form-group">
                            <label>TELEFONO</label>
                            <input type="tel" id="reg-telefono" class="saana-input" placeholder="Tu número celular" required>
                        </div>
                    </div>

                    <!-- COLUMNA DERECHA -->
                    <div class="right-column">
                        <h2>CREAR CONTRASEÑA</h2>
                        <div class="form-group" style="margin-top: 45px;">
                             <label>CREAR CONTRASEÑA:</label>
                            <input type="password" id="reg-password" class="saana-input" placeholder="*********" required>
                        </div>
                         <div class="form-group">
                            <label>REPERTIR CONTRASEÑA</label>
                            <input type="password" id="reg-confirm-password" class="saana-input" placeholder="*********" required>
                        </div>
                    </div>

                     <!-- Botón de enviar -->
                    <div class="btn-submit-container">
                        <button type="submit" class="btn-submit">
                            registrarse <span class="btn-arrow">→</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Conexión con JavaScript -->
    <script src="auth.js"></script>
</body>
</html>
