<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario - SAANA</title>
    <style>
        /* --- ESTILOS BASE --- */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100%;
        }
        body {
            /* El fondo de la tienda se aplica al cuerpo, debajo de la barra superior */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('fondo_tienda.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }

        /* --- BARRA SUPERIOR NEGRA SÓLIDA --- */
        .top-header-bar {
            background-color: #000000; /* Negro sólido */
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            flex-shrink: 0; /* Evita que se encoja */
        }

        .logo {
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }
        .logo-icon { color: #d4af37; margin-right: 10px; font-size: 28px; }

        /* Botón SIGN IN de la esquina */
        .signin-btn-header {
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid white;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 14px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .signin-btn-header:hover { background-color: white; color: black; }

        /* --- ÁREA PRINCIPAL CENTRADA --- */
        .main-content-area {
            flex: 1; /* Ocupa el espacio restante */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- CONTENEDOR GRIS OSCURO SÓLIDO DEL FORMULARIO --- */
        .form-container-solid {
            background-color: #4A4A4A; /* Color gris oscuro sólido de la imagen */
            padding: 50px;
            border-radius: 30px; /* Bordes redondeados */
            width: 100%;
            max-width: 900px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ESTRUCTURA DE DOS COLUMNAS */
        .form-flex-container {
            display: flex;
            gap: 50px; /* Espacio entre columnas */
        }
        .form-column { flex: 1; }

        /* Títulos y Labels */
        h2 { font-size: 24px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; margin-top: 0;}
        label {
            display: block; margin-bottom: 8px; font-weight: bold; font-size: 12px;
            letter-spacing: 1px; text-transform: uppercase; color: #E0E0E0;
        }

        /* --- INPUTS BLANCOS REDONDEADOS --- */
        .saana-input-white {
            width: 100%; padding: 12px 20px; border-radius: 30px; border: none;
            outline: none; font-size: 16px; background-color: #FFFFFF; color: #333;
            box-sizing: border-box; height: 45px;
        }
        /* Estilos para el grupo de fechas */
        .date-group { display: flex; gap: 10px; }
        .date-input { flex: 1; text-align: center; padding: 12px 10px; -webkit-appearance: none; -moz-appearance: none; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>'); background-repeat: no-repeat; background-position-x: 90%; background-position-y: center; }

        .form-group { margin-bottom: 20px; }

        /* Botón de registro (el de abajo) */
        .btn-submit-container { display: flex; justify-content: center; margin-top: 40px; }
        .btn-submit {
            background-color: white; color: black; border: none; padding: 15px 50px;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; text-transform: uppercase; transition: transform 0.2s;
        }
        .btn-submit:hover { transform: scale(1.02); }

        /* Responsive */
        @media (max-width: 768px) {
            .form-flex-container { flex-direction: column; gap: 0; }
            .top-header-bar { padding: 15px 20px; }
            .form-container-solid { padding: 30px 20px; }
            .right-column-spacer { margin-top: 30px; }
        }
    </style>
</head>
<body>
    <!-- BARRA SUPERIOR NEGRA -->
    <header class="top-header-bar">
        <div class="logo"><span class="logo-icon">♦</span> SAANA</div>
        <a href="login.html" class="signin-btn-header">SIGN IN</a>
    </header>

    <!-- ÁREA PRINCIPAL CON EL FONDO DE TIENDA -->
    <main class="main-content-area">
        <!-- CONTENEDOR GRIS OSCURO SÓLIDO -->
        <div class="form-container-solid">
            <form id="form-registro-saana">
                <div class="form-flex-container">
                    <!-- COLUMNA IZQUIERDA -->
                    <div class="form-column">
                        <h2>REGISTRAR USUARIO</h2>
                        
                        <div class="form-group">
                            <label>NOMBRE:</label>
                            <input type="text" id="reg-nombre" class="saana-input-white" required>
                        </div>
                        <div class="form-group">
                            <label>APELLIDO:</label>
                            <input type="text" id="reg-apellido" class="saana-input-white" required>
                        </div>
                        <div class="form-group">
                            <label>FECHA DE NACIMIENTO:</label>
                            <div class="date-group">
                                <select id="reg-dia" class="saana-input-white date-input" required>
                                    <option value="">DIA</option>
                                    <script>for(let i=1;i<=31;i++) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                                <select id="reg-mes" class="saana-input-white date-input" required>
                                    <option value="">MES</option>
                                    <option value="Enero">Enero</option><option value="Febrero">Febrero</option><option value="Marzo">Marzo</option><option value="Abril">Abril</option><option value="Mayo">Mayo</option><option value="Junio">Junio</option><option value="Julio">Julio</option><option value="Agosto">Agosto</option><option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option><option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
                                </select>
                                <select id="reg-anio" class="saana-input-white date-input" required>
                                    <option value="">AÑO</option>
                                    <script>for(let i=2023;i>=1950;i--) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CORREO:</label>
                            <input type="email" id="reg-email" class="saana-input-white" required>
                        </div>
                        <div class="form-group">
                            <label>TELEFONO</label>
                            <input type="tel" id="reg-telefono" class="saana-input-white" required>
                        </div>
                    </div>

                    <!-- COLUMNA DERECHA -->
                    <div class="form-column right-column-spacer">
                        <h2>CREAR CONTRASEÑA</h2>
                        
                        <div class="form-group">
                             <label>CREAR CONTRASEÑA:</label>
                            <input type="password" id="reg-password" class="saana-input-white" required>
                        </div>
                         <div class="form-group">
                            <label>REPERTIR CONTRASEÑA</label>
                            <input type="password" id="reg-confirm-password" class="saana-input-white" required>
                        </div>

                        <!-- Botón de registro (Se mantiene el que teníamos para poder enviar el formulario) -->
                        <div class="btn-submit-container">
                            <button type="submit" class="btn-submit">
                                REGISTRARSE
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <!-- Conexión con JavaScript (Funcionalidad intacta) -->
    <script src="auth.js"></script>
</body>
</html>
