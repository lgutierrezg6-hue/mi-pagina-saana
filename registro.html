<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario - SAANA</title>
    <style>
        /* --- ESTILOS BASE (Igual que en login.html para mantener el fondo y header) --- */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100%;
        }
        body {
            /* FONDO DE LA TIENDA CON FILTRO OSCURO (Igual que en el login) */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('fondo_tienda.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        /* --- HEADER (Igual que en login.html) --- */
        .header {
            padding: 30px;
            display: flex;
            justify-content: space-between; /* Para separar el logo del botón */
            align-items: center;
        }
        .logo {
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }
        .logo-icon {
            color: #d4af37; /* Color dorado/beige */
            margin-right: 10px;
            font-size: 30px;
        }

        /* --- BOTÓN "SIGN IN" DE LA ESQUINA (Estilo de botón blanco) --- */
        .signin-btn {
            color: black; /* Texto negro */
            background-color: white; /* Fondo blanco */
            text-decoration: none;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 30px; /* Redondeado */
            font-size: 14px;
            text-transform: uppercase;
            border: none;
            transition: background-color 0.3s;
        }
        .signin-btn:hover {
            background-color: #f0f0f0; /* Un poco más oscuro al pasar el mouse */
        }

        /* --- CONTENEDOR PRINCIPAL CENTRADO --- */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: calc(100vh - 100px); /* Ajuste para centrar verticalmente */
        }

        /* --- CAJA DEL FORMULARIO (Gris oscuro sólido, como en la imagen de referencia) --- */
        .form-box {
            background-color: #4A4A4A; /* Gris oscuro sólido */
            padding: 50px;
            border-radius: 25px;
            width: 100%;
            max-width: 900px; /* Ancho máximo para que no se estire demasiado */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Sombra suave */
        }

        /* --- ESTRUCTURA EN DOS COLUMNAS --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Dos columnas iguales */
            gap: 50px; /* Espacio entre columnas */
        }

        /* Títulos */
        h2 {
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 25px;
        }

        /* Etiquetas (Labels) */
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #E0E0E0; /* Color claro para las etiquetas */
        }

        /* --- INPUTS (Blancos y Redondeados, igual que en el login) --- */
        .saana-input-white {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            outline: none;
            font-size: 16px;
            background-color: #FFFFFF; /* Fondo blanco */
            color: #333; /* Texto oscuro */
            box-sizing: border-box;
            height: 50px; /* Altura fija */
        }

        /* --- GRUPO DE FECHAS (Tres select en fila) --- */
        .date-group {
            display: flex;
            gap: 15px;
        }
        .date-input {
            flex: 1; /* Ocupan el mismo espacio */
            text-align: center;
            padding: 15px 10px;
            /* Estilo personalizado para el icono del select */
            -webkit-appearance: none; -moz-appearance: none; appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat;
            background-position-x: 90%;
            background-position-y: center;
        }

        /* --- BOTÓN DE REGISTRO (Abajo a la derecha, blanco y redondo) --- */
        .btn-submit-container {
            grid-column: 1 / -1; /* Ocupa el ancho completo de las dos columnas */
            display: flex;
            justify-content: flex-end; /* Alineado a la derecha */
            margin-top: 30px;
        }
        .btn-submit {
            background-color: white;
            color: black;
            border: none;
            padding: 15px 50px; /* Botón ancho */
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            text-transform: uppercase;
            transition: transform 0.2s;
        }
        .btn-submit:hover {
            transform: scale(1.02);
            background-color: #f0f0f0;
        }

        /* Responsive para móviles */
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; gap: 20px; } /* Una sola columna */
            .header { padding: 20px; }
            .form-box { padding: 30px 20px; }
            .right-column-spacer { margin-top: 30px; }
            .btn-submit-container { justify-content: center; } /* Botón centrado en móvil */
        }
    </style>
</head>
<body>
    <!-- HEADER (Igual que en login.html) -->
    <div class="header">
        <div class="logo"><span class="logo-icon">♦</span> SAANA</div>
        <!-- Botón SIGN IN blanco en la esquina -->
        <a href="login.html" class="signin-btn">SIGN IN</a>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="main-container">
        <!-- CAJA DEL FORMULARIO (Gris oscuro sólido) -->
        <div class="form-box">
            <!-- El formulario mantiene el ID y los required para que funcione el JS -->
            <form id="form-registro-saana">
                <div class="form-grid">
                    <!-- COLUMNA IZQUIERDA: Datos Personales -->
                    <div class="form-column">
                        <h2>REGISTRAR USUARIO</h2>
                        
                        <div class="form-group">
                            <label>NOMBRE:</label>
                            <input type="text" id="reg-nombre" class="saana-input-white" placeholder="Tu Nombre" required>
                        </div>
                        <div class="form-group">
                            <label>APELLIDO:</label>
                            <input type="text" id="reg-apellido" class="saana-input-white" placeholder="Tu Apellido" required>
                        </div>
                        <div class="form-group">
                            <label>FECHA DE NACIMIENTO:</label>
                            <div class="date-group">
                                <select id="reg-dia" class="saana-input-white date-input" required>
                                    <option value="">DIA</option>
                                    <!-- Generamos días con JS simple -->
                                    <script>for(let i=1;i<=31;i++) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                                <select id="reg-mes" class="saana-input-white date-input" required>
                                    <option value="">MES</option>
                                    <option value="Enero">Enero</option><option value="Febrero">Febrero</option><option value="Marzo">Marzo</option><option value="Abril">Abril</option><option value="Mayo">Mayo</option><option value="Junio">Junio</option><option value="Julio">Julio</option><option value="Agosto">Agosto</option><option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option><option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
                                </select>
                                <select id="reg-anio" class="saana-input-white date-input" required>
                                    <option value="">AÑO</option>
                                    <!-- Generamos años con JS simple -->
                                    <script>for(let i=2023;i>=1950;i--) document.write(`<option value="${i}">${i}</option>`);</script>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CORREO:</label>
                            <input type="email" id="reg-email" class="saana-input-white" placeholder="tu.correo@gmail.com" required>
                        </div>
                        <div class="form-group">
                            <label>TELEFONO</label>
                            <input type="tel" id="reg-telefono" class="saana-input-white" placeholder="Tu teléfono" required>
                        </div>
                    </div>

                    <!-- COLUMNA DERECHA: Contraseña -->
                    <div class="form-column right-column-spacer">
                        <h2>CREAR CONTRASEÑA</h2>
                        
                        <!-- Espacio extra arriba para alinear visualmente -->
                        <div class="form-group" style="margin-top: 50px;">
                             <label>CREAR CONTRASEÑA:</label>
                            <input type="password" id="reg-password" class="saana-input-white" placeholder="*********" required>
                        </div>
                         <div class="form-group">
                            <label>REPERTIR CONTRASEÑA</label>
                            <input type="password" id="reg-confirm-password" class="saana-input-white" placeholder="*********" required>
                        </div>

                        <!-- Botón de registro (Se mantiene el que teníamos) -->
                        <div class="btn-submit-container">
                            <button type="submit" class="btn-submit">
                                REGISTRARSE
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Conexión con JavaScript (Funcionalidad intacta) -->
    <script src="auth.js"></script>
</body>
</html>
