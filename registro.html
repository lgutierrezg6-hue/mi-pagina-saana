<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro SAANA</title>
    <!-- Tus estilos CSS aquí -->
    <style>
        body { font-family: sans-serif; background: #222; color: white; text-align: center; padding-top: 50px;}
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; border-radius: 20px; border: none;}
        button { padding: 10px 30px; border-radius: 20px; cursor: pointer; background: #aaa; border: none; font-weight: bold;}
    </style>
</head>
<body>
    <h2>Crear Cuenta</h2>
    <!-- Es importante que el formulario tenga el ID 'form-registro' -->
    <form id="form-registro">
        <!-- Campo NOMBRE (Importante para que aparezca luego) -->
        <label>Nombre:</label>
        <input type="text" id="reg-nombre" placeholder="Tu nombre" required>

        <label>Correo:</label>
        <input type="email" id="reg-email" placeholder="Correo" required>

        <label>Contraseña:</label>
        <input type="password" id="reg-password" placeholder="Contraseña" required>

        <button type="submit">Registrarme</button>
    </form>
    <p><a href="login.html" style="color: #aaa;">Ya tengo cuenta, ir al login</a></p>

    <!-- VINCULAR EL ARCHIVO JS AL FINAL DEL BODY -->
    <script src="auth.js"></script>
</body>
</html>
