<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SAANA</title>
    <style>
        /* Estilos basados en el PDF */
        body {
            margin: 0; padding: 0; font-family: sans-serif;
            background-color: #1E1E24; /* Color de fondo oscuro del PDF */
            color: white;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center;}
        .logo { font-weight: bold; letter-spacing: 2px;}
        .sign-up-text { color: #ccc; font-size: 0.9rem;}
        
        .main-container {
            margin-top: 20px; width: 90%; max-width: 500px; text-align: center;
        }
        h2 { letter-spacing: 3px; font-weight: 400; margin-bottom: 40px;}
        
        /* Estilos del formulario para coincidir con el PDF */
        .form-group { margin-bottom: 20px; text-align: left;}
        .form-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .form-col { flex: 1; text-align: left;}
        
        label { display: block; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; margin-left: 10px;}
        
        /* Inputs estilo PDF: Grises y redondeados */
        .saana-input {
            width: 100%; padding: 12px 20px; border-radius: 25px;
            border: none; background-color: #4A4A52; /* Gris del PDF */
            color: white; outline: none; box-sizing: border-box;
        }
        .date-input { text-align: center; }

        .btn-registrarse {
            width: 50%; padding: 15px; border-radius: 30px; border: none;
            background-color: #A0A0A8; color: #1E1E24;
            font-weight: bold; letter-spacing: 1px; cursor: pointer;
            margin-top: 30px; margin-bottom: 50px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="sign-up-text">Sign up</div>
        <div class="logo">SAANA</div>
        <div class="sign-up-text">Sign up</div>
    </div>

    <div class="main-container">
        <h2>R E G I S T R A R U S U A R I O</h2>

        <!-- IMPORTANTE: ID del formulario para el JS -->
        <form id="form-registro-saana">
            <!-- Fila 1: Nombre y Apellido -->
            <div class="form-row">
                <div class="form-col">
                    <label>N O M B R E :</label>
                    <input type="text" id="reg-nombre" class="saana-input" required>
                </div>
                <div class="form-col">
                    <label>A P E L L I D O :</label>
                    <input type="text" id="reg-apellido" class="saana-input" required>
                </div>
            </div>

            <!-- Fila 2: Fecha de nacimiento -->
            <div class="form-group">
                <label>F E C H A D E N A C I M I E N T O :</label>
                <div class="form-row">
                    <input type="text" id="reg-dia" class="saana-input date-input" placeholder="D I A" style="flex:1">
                    <input type="text" id="reg-mes" class="saana-input date-input" placeholder="M E S" style="flex:1">
                    <input type="text" id="reg-ano" class="saana-input date-input" placeholder="A Ñ O" style="flex:1">
                </div>
            </div>

            <!-- Fila 3: Correo y Teléfono -->
            <div class="form-row">
                <div class="form-col">
                    <label>C O R R E O :</label>
                    <input type="email" id="reg-email" class="saana-input" required>
                </div>
                <div class="form-col">
                    <label>T E L E F O N O</label>
                    <input type="tel" id="reg-telefono" class="saana-input">
                </div>
            </div>

            <!-- Fila 4: Contraseñas -->
            <div class="form-row" style="margin-top: 40px;">
                <div class="form-col">
                    <label>C R E A R C O N T R A S E Ñ A :</label>
                    <input type="password" id="reg-password" class="saana-input" placeholder="*********" required>
                </div>
                <div class="form-col">
                    <label>R E P E T I R C O N T R A S E Ñ A</label>
                    <input type="password" id="reg-confirm-password" class="saana-input" placeholder="*********" required>
                </div>
            </div>

            <button type="submit" class="btn-registrarse">registrarse</button>
        </form>
    </div>

    <!-- Conexión con el cerebro JS -->
    <script src="auth.js"></script>
</body>
</html>
