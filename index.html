<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAANA Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Iconos para el menú (Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-container">
        
        <!-- Barra Lateral (Sidebar) -->
        <nav class="sidebar">
            <div class="user-profile">
                <div class="profile-img-placeholder"></div>
                <h3>Juliana Silva</h3>
                <p>@reallygreatsite</p>
            </div>

            <ul class="nav-menu">
                <li class="active"><a href="#"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="#"><i class="fa-solid fa-fire"></i> Trending Now</a></li>
                <li><a href="#"><i class="fa-solid fa-mobile-screen"></i> Tecnología</a></li>
                <li><a href="#"><i class="fa-solid fa-cart-shopping"></i> Carrito</a></li>
                <li><a href="#"><i class="fa-regular fa-gem"></i> Accesorios</a></li>
            </ul>

            <div class="settings-link">
                 <a href="#"><i class="fa-solid fa-gear"></i> Setting</a>
            </div>
        </nav>

        <!-- Contenido Principal (Aquí irá el resto de la página) -->
        <!-- Contenido Principal -->
        <main class="main-content">
            
            <!-- SECCIÓN 1: Home / Trending Now (Esta se muestra al inicio) -->
            <section id="home-section">
                <header style="margin-bottom: 30px;">
                     <h1 style="color: #333;">Trending Now</h1>
                </header>
                
                <!-- Aquí es donde JAVASCRIPT inyectará los productos automáticamente -->
                <div class="product-grid" id="products-container">
                    <!-- Los productos aparecerán aquí mágicamente -->
                </div>
            </section>


            <!-- SECCIÓN 2: El Carrito (Inicialmente oculta) -->
            <section id="cart-section" class="hidden-section">
                <header style="margin-bottom: 30px;">
                    <h1 style="color: #333;">Tu Carrito de Compras</h1>
               </header>
               
               <div id="cart-items-container">
                   <p>Tu carrito está vacío por ahora.</p>
               </div>
            </section>

        </main>

    </div>

</body>
</html>
