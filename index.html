<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos a SAANA</title>
    <!-- Vinculamos la hoja de estilos CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Usaremos Font Awesome para los iconos (flechas, usuario, redes sociales) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Importamos una fuente bonita de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Contenedor principal que ocupa toda la pantalla con la imagen de fondo -->
    <div class="landing-page">
        
        <!-- BARRA SUPERIOR (Logo izquierda, Botón Sign up derecha) -->
        <header class="top-bar">
            <!-- Área del Logo -->
            <div class="logo-container">
                <!-- Icono temporal y texto para el logo -->
                <div class="logo-icon-box">
                    <i class="fa-brands fa-slack"></i>
                </div>
                <span class="logo-text">SAANA</span>
            </div>
            
            <!-- Botón "Sign up" CORREGIDO -->
            <!-- Asegúrate que diga class="signup-btn" y href="login.html" -->
            <a href="login.html" class="signup-btn">
                Sign up <i class="fa-solid fa-arrow-right-long"></i>
            </a>
        </header>


        <!-- CONTENIDO CENTRAL (Título, Subtítulo y Botón Principal) -->
        <main class="hero-content">
            <h1>BIENVENIDOS</h1>
            <p class="subtitle">Donde la tecnología se viste de estilo</p>
            
           <!-- Botón grande "INGRESAR A CATALOGO" -->
<!-- AQUÍ ESTÁ EL CAMBIO: href="catalogo.html" -->
        <a href="catalogo.html" class="catalog-btn">
            <span class="btn-text">INGRESAR A<br>CATALOGO</span>
            <span class="btn-arrow-circle">
                <i class="fa-solid fa-arrow-right"></i>
                </span>
        </a>
            
        </main>


        <!-- BARRA INFERIOR (Contacto izquierda, Usuario derecha) -->
        <footer class="bottom-bar">
            <!-- Información de contacto (Email y WhatsApp) -->
            <div class="contact-info">
                <div class="contact-pill">
                    <div class="icon-circle red">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                    <span>SAANA@gmail.com</span>
                </div>
                <div class="contact-pill">
                    <div class="icon-circle green">
                        <i class="fa-brands fa-whatsapp"></i>
                    </div>
                    <span>311 557 8786</span>
                </div>
            </div>

            <!-- Icono de Usuario -->
            <div class="user-icon-container">
                 <i class="fa-regular fa-user"></i>
            </div>
        </footer>

    </div>

</body>
</html>
