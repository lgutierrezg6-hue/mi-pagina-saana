<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAANA</title>
    <style>
        /* Estilos basados en el PDF de Login */
        body {
            margin: 0; padding: 0; font-family: sans-serif;
            background-color: #1E1E24;
            color: white;
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }
        .header-login {
            margin-top: 30px; margin-bottom: 40px;
            text-align: center;
        }
        .header-login h3 { letter-spacing: 2px; font-weight: 400; margin: 0; font-size: 1.1rem;}
        .header-login h1 { letter-spacing: 3px; font-weight: bold; margin: 10px 0; font-size: 2rem;}
        
        .login-container { width: 90%; max-width: 350px; text-align: center;}
        h2 { letter-spacing: 3px; font-weight: 400; margin-bottom: 40px; font-size: 1.2rem;}

        .form-group { margin-bottom: 25px; text-align: left;}
        label { display: block; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; margin-left: 15px;}
        
        .saana-input {
            width: 100%; padding: 15px 20px; border-radius: 30px;
            border: none; background-color: #4A4A52;
            color: white; outline: none; box-sizing: border-box;
        }
        .saana-input::placeholder { color: #ccc; letter-spacing: 2px;}

        .btn-sign-up {
             width: 50%; padding: 15px; border-radius: 30px; border: none;
            background-color: #A0A0A8; color: #1E1E24;
            font-weight: bold; letter-spacing: 1px; cursor: pointer;
            margin-top: 20px;
        }
        .register-link { display: block; margin-top: 30px; color: #ccc; text-decoration: underline; font-size: 0.8rem;}
    </style>
</head>
<body>
    <div class="header-login">
        <h3>I N G R E S A R A</h3>
        <h1>SAANA</h1>
        <h3>C A T A L O G O</h3>
    </div>

    <div class="login-container">
        <h2>INICIAR SESIÓN</h2>
        
        <!-- IMPORTANTE: ID del formulario -->
        <form id="form-login-saana">
            <div class="form-group">
                <label>C O R R E O :</label>
                <!-- IMPORTANTE: ID del email -->
                <input type="email" id="login-email" class="saana-input" required>
            </div>

            <div class="form-group">
                <label>C O N T R A S E Ñ A :</label>
                <!-- IMPORTANTE: ID del password -->
                <input type="password" id="login-password" class="saana-input" placeholder="************" required>
            </div>

            <button type="submit" class="btn-sign-up">Sign up</button>
        </form>

        <a href="registro.html" class="register-link">Necesito registrarme</a>
    </div>

    <!-- Conexión con el cerebro JS -->
    <script src="auth.js"></script>
</body>
</html>
