<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SAANA</title>
    <!-- Usaremos un CSS específico para esta página -->
    <link rel="stylesheet" href="login.css">
    <!-- Iconos y Fuentes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Logo en la esquina superior izquierda (igual que en el home) -->
    <div class="logo-container-fixed">
        <div class="logo-compound-fixed">
            <i class="fa-brands fa-slack logo-icon-small"></i>
            <div class="logo-text-block">
                <img src="logo-sa.png" alt="SA" class="logo-sa-img-small">
                <span class="logo-saana-text">SAANA</span>
            </div>
        </div>
    </div>

    <!-- Contenedor del formulario centrado -->
    <div class="login-container">
        
        <h2 class="login-title">INICIAR SESIÓN</h2>

        <form class="login-form">
            <!-- Campo Correo -->
            <div class="input-group">
                <label for="email">CORREO:</label>
                <input type="email" id="email" required>
            </div>

            <!-- Campo Contraseña -->
            <div class="input-group">
                <label for="password">CONTRASEÑA:</label>
                <input type="password" id="password" required>
            </div>

            <!-- Botón de acción (En tu diseño dice "Sign up", aunque sea iniciar sesión) -->
            <button type="submit" class="login-submit-btn">Sign up</button>

            <!-- Enlace de registro inferior -->
            <a href="registro.html" class="register-link-bottom">Necesito registrarme</a>
        </form>

    </div>

</body>
</html>
