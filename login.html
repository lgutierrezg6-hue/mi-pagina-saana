<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAANA</title>
    <style>
        /* --- ESTILOS PARA RECREAR LA VISUAL EXACTA DE TU IMAGEN --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            /* Fondo de la tienda con un filtro oscuro encima */
            /* ASEGÚRATE QUE 'fondo-tienda.jpg' ESTÉ EN LA CARPETA */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('fondo-tienda.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh; /* Altura completa de la pantalla */
            display: flex;
            flex-direction: column;
        }
        
        /* Header con el logo de texto en la esquina */
        .header {
            padding: 30px;
        }
        .logo {
            color: white;
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }
        /* Icono simulado (puedes cambiar el símbolo si quieres) */
        .logo-icon {
            color: #d4af37; /* Color dorado/beige */
            margin-right: 10px;
            font-size: 30px;
        }

        /* Contenedor principal centrado */
        .login-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding-bottom: 50px; /* Un poco de espacio abajo */
        }

        h1 {
            font-size: 36px;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- FORMULARIO CON FONDO OSCURO TRANSPARENTE --- */
        .login-form {
            background: rgba(0, 0, 0, 0.2); /* Fondo negro muy transparente */
            padding: 50px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            /* Sombra suave para separarlo del fondo */
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        /* --- INPUTS BLANCOS Y REDONDEADOS --- */
        .saana-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px; /* Bordes muy redondos */
            border: none;
            background-color: white;
            color: black;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        /* --- BOTÓN "Sign up" BLANCO Y REDONDEADO --- */
        .btn-signup {
            width: 50%; /* Más pequeño, como en la imagen */
            padding: 15px;
            border-radius: 30px;
            border: none;
            background-color: white;
            color: black;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .btn-signup:hover {
            background-color: #f0f0f0;
        }

        /* Enlace de abajo */
        .register-link {
            display: block;
            margin-top: 30px;
            color: white;
            text-decoration: underline;
            font-size: 16px;
            letter-spacing: 1px;
        }
        /* =========================================
           RESPONSIVE: REGLAS PARA MÓVILES
           (Pega esto al final de tu <style> en login.html y registro.html)
        ========================================= */
        
        /* Cuando la pantalla tenga 768px de ancho o menos (Tablets y Celulares) */
        @media (max-width: 768px) {
            /* Reducimos el padding del header */
            .header {
                padding: 15px 20px;
            }

            /* El contenedor principal tiene menos padding */
            .main-container {
                padding: 20px;
                /* En registro, alineamos arriba en vez de al centro verticalmente para que no corte si es muy largo */
                align-items: flex-start; 
            }

            /* La caja del formulario (login o registro) ocupa el ancho completo */
            /* Nota: usamos nombres de clases genéricos para que sirva en ambos archivos si los usaste */
            .form-box, .login-box, .registro-form-container {
                padding: 30px 20px; /* Menos relleno interno */
                max-width: 100%;    /* Ocupa todo el ancho disponible */
                border-radius: 15px; /* Bordes menos redondeados para ganar espacio */
            }

            /* Títulos más pequeños */
            h1, h2 {
                font-size: 24px;
                margin-bottom: 25px;
            }

            /* --- ESPECÍFICO PARA REGISTRO --- */
            /* Cambiamos la cuadrícula de 2 columnas a 1 sola columna */
            .form-grid {
                grid-template-columns: 1fr; /* Una sola columna */
                gap: 20px; /* Menos espacio entre campos */
            }

            /* Los inputs de fecha se apilan verticalmente si hace falta, o se mantienen pequeños */
            .date-group {
                gap: 5px;
            }
            .date-input {
                padding: 15px 5px; /* Menos padding lateral */
            }

            /* Botón de registro ocupa todo el ancho */
            .btn-submit {
                width: 100%;
                padding: 15px;
            }
        }
    </style>
    
</head>
<body>
    <!-- Header con el logo de texto -->
    <div class="header">
        <div class="logo"><span class="logo-icon">♦</span> SAANA</div>
    </div>

    <div class="login-container">
        <h1>INICIAR SESIÓN</h1>
        
        <!-- 
          Este formulario tiene el ID correcto (form-login-saana)
          para conectarse con el archivo auth.js
        -->
        <form id="form-login-saana" class="login-form">
            <div class="input-group">
                <label>CORREO:</label>
                <!-- ID correcto para el email -->
                <input type="email" id="login-email" class="saana-input" required>
            </div>

            <div class="input-group">
                <label>CONTRASEÑA:</label>
                <!-- ID correcto para la contraseña -->
                <input type="password" id="login-password" class="saana-input" required>
            </div>

            <button type="submit" class="btn-signup">Sign up</button>
        </form>

        <a href="registro.html" class="register-link">Necesito registrarme</a>
    </div>

    <!-- Conexión con el archivo de funcionalidad -->
    <script src="auth.js"></script>
</body>
</html>
