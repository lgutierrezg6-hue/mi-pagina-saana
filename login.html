<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SAANA</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }
        body {
            /* REEMPLAZA 'fondo_tienda.jpg' con tu imagen de fondo */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('fondo_tienda.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        /* --- LOGO DE IMAGEN EN LA ESQUINA --- */
        .logo-container {
            position: absolute; top: 0; left: 0; padding: 20px; z-index: 10;
        }
        .logo-img {
            width: 100px; height: auto; display: block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        /* --- CONTENEDOR CENTRAL (Efecto Vidrio) --- */
        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px; padding: 50px 60px; width: 100%; max-width: 450px;
            text-align: center; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h2 {
            margin: 0 0 40px 0; font-size: 28px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .input-group { margin-bottom: 30px; text-align: left; }
        label {
            display: block; margin-bottom: 10px; font-size: 14px;
            font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
        }
        .saana-input {
            width: 100%; padding: 15px 20px; border: none; border-radius: 50px;
            background-color: white; color: #333; font-size: 18px; outline: none;
            box-sizing: border-box;
        }
        .btn-signup {
            width: 100%; padding: 15px; border: none; border-radius: 50px;
            background-color: white; color: black; font-size: 18px; font-weight: bold;
            cursor: pointer; transition: background-color 0.3s; margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-signup:hover { background-color: #f0f0f0; }
        .register-link {
            display: block; margin-top: 30px; color: white; text-decoration: underline;
            font-size: 14px; letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <!-- Contenedor para la imagen del logo -->
    <div class="logo-container">
        <!-- REEMPLAZA 'logo-saana.jpg' con el nombre de tu imagen del logo -->
        <img src="logo-saana.jpg" alt="Logo SAANA" class="logo-img">
    </div>

    <!-- Contenedor central -->
    <div class="login-box">
        <h2>INICIAR SESIÒN</h2>
        <!-- El formulario está conectado al JS mediante su ID -->
        <form id="form-login-saana">
            <div class="input-group">
                <label for="login-email">CORREO:</label>
                <input type="email" id="login-email" class="saana-input" required>
            </div>
            <div class="input-group">
                <label for="login-password">CONTRASEÑA:</label>
                <input type="password" id="login-password" class="saana-input" required>
            </div>
            <button type="submit" class="btn-signup">Sign up</button>
        </form>
        <a href="registro.html" class="register-link">Necesito registrarme</a>
    </div>

    <!-- ESTA LÍNEA ES LA QUE HACE LA MAGIA: Carga el archivo JS -->
    <script src="auth.js"></script>
</body>
</html>
