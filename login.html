<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAANA</title>
    <style>
        /* Estilos para recrear la estética de tu captura de pantalla */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fondo oscuro simulado. Si tenías una imagen, ponla aquí */
            background-color: #1a1a1a; 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('tu-imagen-de-fondo.jpg'); /* Reemplaza si tienes imagen */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .header-logo {
            margin-top: 20px;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: 2px;
            /* Ajusta esto si tienes una imagen de logo real */
             color: #d4af37; /* Color dorado similar al logo de la foto */
        }

        .login-wrapper {
            /* El contenedor transparente de tu diseño */
            background-color: rgba(255, 255, 255, 0.05); /* Muy transparente */
            backdrop-filter: blur(5px); /* Efecto borroso si el navegador lo soporta */
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            margin-top: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { letter-spacing: 3px; margin-bottom: 30px; font-weight: 300;}

        /* Estilos de tus etiquetas y campos */
        .input-group { margin-bottom: 25px; text-align: left; }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-left: 15px; /* Alineado con el inicio de la curva del input */
        }

        /* TUS INPUTS GRISES REDONDEADOS */
        .saana-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            background-color: #808080; /* Color gris de tu diseño */
            color: #1a1a1a; /* Texto oscuro dentro del input */
            font-size: 1rem;
            outline: none;
            box-sizing: border-box; /* Importante para que el padding no rompa el ancho */
        }
        .saana-input::placeholder { color: #444; }

        /* TU BOTÓN REDONDEADO */
        .btn-saana {
            width: 60%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background-color: #a0a0a0; /* Un gris un poco más claro para el botón */
            color: #1a1a1a;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        .btn-saana:hover { background-color: #b0b0b0; }

        /* ENLACE DE REGISTRO */
        .register-link {
            display: block;
            margin-top: 30px;
            color: #aaa;
            text-decoration: underline;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Header simple para el logo -->
    <div class="header-logo">SAANA</div>

    <div class="login-wrapper">
        <h2>INICIAR SESIÓN</h2>

        <!-- FORMULARIO: ID IMPORTANTE 'form-login-saana' -->
        <form id="form-login-saana">
            
            <div class="input-group">
                <label for="login-email">CORREO:</label>
                <!-- INPUT EMAIL: ID IMPORTANTE 'login-email' -->
                <input type="email" id="login-email" class="saana-input" placeholder="tu.correo@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="login-password">CONTRASEÑA:</label>
                <!-- INPUT PASSWORD: ID IMPORTANTE 'login-password' -->
                <input type="password" id="login-password" class="saana-input" placeholder=".........." required>
            </div>

            <!-- Botón de acción (En tu diseño dice "Sign up" aunque sea login) -->
            <button type="submit" class="btn-saana">Sign up</button>

        </form>

        <!-- Enlace al registro -->
        <a href="registro.html" class="register-link">Necesito registrarme</a>
    </div>

    <!-- CONEXIÓN FUNDAMENTAL CON EL JAVASCRIPT -->
    <script src="auth.js"></script>
</body>
</html>
