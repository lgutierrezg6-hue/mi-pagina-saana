<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SAANA</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            /* Fondo de la tienda con un filtro oscuro encima */
            /* REEMPLAZA 'fondo_tienda.jpg' con tu imagen de fondo */
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('fondo_tienda.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; /* Necesario para posicionar el logo absoluto */
        }

        /* --- NUEVO: ESTILO PARA EL LOGO DE IMAGEN EN LA ESQUINA --- */
        .logo-container {
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px; /* Espacio desde el borde */
            z-index: 10; /* Asegura que quede por encima del fondo */
        }
        
        .logo-img {
            width: 100px; /* Tamaño del cuadro del logo. Ajústalo si es necesario */
            height: auto;
            display: block;
            /* Opcional: una pequeña sombra para que resalte como en la imagen */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* --- CONTENEDOR CENTRAL (Efecto Vidrio - Igual que antes) --- */
        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 50px 60px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        /* --- TÍTULO --- */
        h2 {
            margin: 0 0 40px 0;
            font-size: 28px; /* Un poco más pequeño para ajustar a la imagen */
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- GRUPOS DE INPUTS --- */
        .input-group {
            margin-bottom: 30px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- ESTILO DE LOS CAMPOS DE TEXTO (Blancos y Redondeados) --- */
        .saana-input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 50px;
            background-color: white;
            color: #333;
            font-size: 18px;
            outline: none;
            box-sizing: border-box;
        }

        /* --- BOTÓN "Sign up" --- */
        .btn-signup {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background-color: white;
            color: black;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
            text-transform: uppercase; /* Para que diga "SIGN UP" en mayúsculas si quieres */
        }

        .btn-signup:hover {
            background-color: #f0f0f0;
        }

        /* --- ENLACE DE REGISTRO --- */
        .register-link {
            display: block;
            margin-top: 30px;
            color: white;
            text-decoration: underline;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- NUEVO: Contenedor para la imagen del logo -->
    <div class="logo-container">
        <!-- 
          IMPORTANTE: Reemplaza 'logo-saana.jpg' con el nombre real 
          de tu archivo de imagen del logo (el cuadro negro con letras blancas).
        -->
        <img src="logo-saana.jpg" alt="Logo SAANA" class="logo-img">
    </div>

    <!-- Contenedor central con efecto de vidrio -->
    <div class="login-box">
        <h2>INICIAR SESIÒN</h2>
        
        <!-- ID del formulario para la funcionalidad JS -->
        <form id="form-login-saana">
            
            <div class="input-group">
                <label for="login-email">CORREO:</label>
                <!-- ID para JS -->
                <input type="email" id="login-email" class="saana-input" required>
            </div>

            <div class="input-group">
                <label for="login-password">CONTRASEÑA:</label>
                <!-- ID para JS -->
                <input type="password" id="login-password" class="saana-input" required>
            </div>

            <button type="submit" class="btn-signup">Sign up</button>

        </form>

        <a href="registro.html" class="register-link">Necesito registrarme</a>
    </div>

    <!-- Vinculación con el script JS (asegúrate que esté en la carpeta) -->
    <script src="auth.js"></script>

</body>
</html>
