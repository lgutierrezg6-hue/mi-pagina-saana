<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAANA</title>
    <style>
        /* Estilos para recrear image_0.png */
        body {
            margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            /* REEMPLAZA 'fondo-tienda.jpg' POR TU IMAGEN REAL */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('fondo-tienda.jpg');
            background-size: cover; background-position: center;
            height: 100vh; display: flex; flex-direction: column;
        }
        
        .header { padding: 20px; }
        .logo { color: white; font-weight: bold; font-size: 24px; letter-spacing: 2px; display: flex; align-items: center;}
        .logo-icon { color: #d4af37; margin-right: 10px; font-size: 30px;} /* Icono dorado simulado */

        .login-container {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center;
        }

        h1 { font-size: 36px; letter-spacing: 3px; margin-bottom: 40px; font-weight: bold;}

        /* Formulario transparente */
        .login-form {
            background: rgba(255, 255, 255, 0.1); /* Fondo sutilmente transparente */
            padding: 50px; border-radius: 20px; width: 100%; max-width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .input-group { margin-bottom: 25px; text-align: left;}
        label { display: block; font-weight: bold; margin-bottom: 10px; letter-spacing: 1px; font-size: 14px;}
        
        /* Inputs blancos redondeados como en la imagen */
        .saana-input {
            width: 100%; padding: 15px 20px; border-radius: 30px; border: none;
            background-color: white; color: black; font-size: 16px; outline: none; box-sizing: border-box;
        }

        /* Botón blanco redondeado */
        .btn-signup {
            width: 50%; padding: 15px; border-radius: 30px; border: none;
            background-color: white; color: black; font-weight: bold; font-size: 16px;
            cursor: pointer; margin-top: 20px; transition: background-color 0.3s;
        }
        .btn-signup:hover { background-color: #f0f0f0; }

        .register-link {
            display: block; margin-top: 30px; color: white; text-decoration: underline; font-size: 16px; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><span class="logo-icon">♦</span> SAANA</div>
    </div>

    <div class="login-container">
        <h1>INICIAR SESIÓN</h1>
        
        <!-- ID del formulario para el JS -->
        <form id="form-login-saana" class="login-form">
            <div class="input-group">
                <label>CORREO:</label>
                <!-- ID del email para el JS -->
                <input type="email" id="login-email" class="saana-input" required>
            </div>

            <div class="input-group">
                <label>CONTRASEÑA:</label>
                <!-- ID del password para el JS -->
                <input type="password" id="login-password" class="saana-input" required>
            </div>

            <button type="submit" class="btn-signup">Sign up</button>
        </form>

        <a href="registro.html" class="register-link">Necesito registrarme</a>
    </div>

    <!-- Conexión con el cerebro JS -->
    <script src="auth.js"></script>
</body>
</html>
