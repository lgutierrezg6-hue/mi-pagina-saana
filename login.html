<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SAANA</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="logo-container-fixed">
        <div class="logo-compound-fixed">
            <i class="fa-brands fa-slack logo-icon-small"></i>
            <div class="logo-text-block">
                <img src="logo-sa.png" alt="SA" class="logo-sa-img-small">
                <span class="logo-saana-text">SAANA</span>
            </div>
        </div>
    </div>

    <div class="login-container">
        <h2 class="login-title">INICIAR SESIÓN</h2>

        <!-- LE PUSIMOS ID AL FORMULARIO -->
        <form class="login-form" id="form-login">
            <div class="input-group">
                <label for="email">CORREO:</label>
                <!-- ID PARA EL CORREO -->
                <input type="email" id="login-email" required>
            </div>

            <div class="input-group">
                <label for="password">CONTRASEÑA:</label>
                <!-- ID PARA LA CONTRASEÑA -->
                <input type="password" id="login-pass" required>
            </div>

            <button type="submit" class="login-submit-btn">Sign up</button>

            <a href="registro.html" class="register-link-bottom">Necesito registrarme</a>
        </form>
    </div>

    <!-- CONECTAMOS EL CEREBRO (JAVASCRIPT) -->
    <script src="script.js"></script>
</body>
</html>
