<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login SAANA</title>
    <!-- TUS ESTILOS CSS ORIGINALES AQUÍ (He puesto unos básicos de ejemplo) -->
    <style>
        body { font-family: sans-serif; background: url('tu-fondo.jpg') no-repeat center center fixed; background-size: cover; color: white; text-align: center; }
        .login-container { background: rgba(0,0,0,0.7); margin: 100px auto; padding: 40px; width: 300px; border-radius: 20px;}
        input { display: block; margin: 10px auto; padding: 15px; width: 90%; border-radius: 30px; border: none; background: #aaa;}
        button { padding: 15px 50px; border-radius: 30px; cursor: pointer; background: #ccc; border: none; font-weight: bold; font-size: 16px; margin-top: 20px;}
        label { display: block; text-align: left; margin-left: 10px; font-weight: bold;}
    </style>
</head>
<body>
    <!-- LOGO Y HEADER AQUÍ -->
    <div class="login-container">
        <!-- IMPORTANTE: El formulario debe tener el ID 'form-login' -->
        <form id="form-login">
            <label>CORREO:</label>
            <!-- IMPORTANTE: El ID debe ser 'login-email' -->
            <input type="email" id="login-email" placeholder="ivanessa.g.g02@gmail.com" required>

            <label>CONTRASEÑA:</label>
             <!-- IMPORTANTE: El ID debe ser 'login-password' -->
            <input type="password" id="login-password" placeholder=".........." required>

            <button type="submit">Sign up (Ingresar)</button>
        </form>
        <!-- Asegúrate de que este enlace apunte a tu nuevo registro.html -->
        <p><a href="registro.html" style="color: #aaa; text-decoration: underline;">Necesito registrarme</a></p>
    </div>

    <!-- VINCULAR EL ARCHIVO JS AL FINAL DEL BODY -->
    <script src="auth.js"></script>
</body>
</html>
