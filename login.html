<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - SAANA</title>
    <!-- Vinculamos un CSS específico para esta página -->
    <link rel="stylesheet" href="login.css">
    <!-- Iconos de Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- El contenedor principal que centra todo en la pantalla -->
    <div class="main-container">
        
        <!-- La cajita blanca del formulario -->
        <div class="login-box">
            <!-- Título / Logo temporal -->
            <h2 class="logo-text">SAANA</h2>
            
            <h3>¡Bienvenido de nuevo!</h3>
            <p class="subtitle">Por favor, ingresa tus datos.</p>

            <form action="#">
                <!-- Campo de Email -->
                <div class="input-group">
                    <i class="fa-solid fa-envelope icon"></i>
                    <input type="email" placeholder="Ingresa tu email" required>
                </div>

                <!-- Campo de Contraseña -->
                <div class="input-group">
                    <i class="fa-solid fa-lock icon"></i>
                    <input type="password" placeholder="Ingresa tu contraseña" required>
                    <i class="fa-solid fa-eye show-pass"></i> <!-- Icono de ojito (visual por ahora) -->
                </div>

                <div class="forgot-pass">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="login-btn">Iniciar Sesión</button>
            </form>

            <div class="register-link">
                <p>¿No tienes una cuenta? <a href="#">Regístrate</a></p>
            </div>
        </div>
    </div>

</body>
</html>
